<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Template Based Watermark Detection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>
<style>body{font-family:'Inter',sans-serif}</style>
</head>

<body class="bg-background-light min-h-screen text-slate-900">

<header class="w-full bg-[#1f3c88] text-white px-6 py-4 flex items-center justify-between">
<h1 class="text-lg font-bold">Watermark Intelligence System</h1>
<a href="/all/{{username}}" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-white/10 text-white transition">
<span class="material-symbols-outlined">home</span>
</a>
</header>

<div class="flex flex-col min-h-screen items-center justify-center p-4 md:p-8">

<main class="w-full max-w-2xl bg-white rounded-xl shadow-sm border p-6 md:p-10">
<div class="text-center mb-8">
<h1 class="text-3xl font-black mb-2 tracking-tight">Template Watermark Detection</h1>
<p class="text-slate-500">Identify presence of specific watermarks using a reference template.</p>
</div>

<form id="detectForm" action="/template/{{ username }}" method="POST" enctype="multipart/form-data" class="space-y-8">

<div class="space-y-3">
<h3 class="font-semibold uppercase tracking-wider text-xs">Upload Main Image</h3>
<div class="group relative flex flex-col items-center justify-center w-full h-44 border-2 border-dashed rounded-xl cursor-pointer">
<span class="material-symbols-outlined text-4xl">image</span>
<input name="main_image" id="main_image" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/png,image/jpeg" type="file" multiple required>
</div>
<div id="mainPreview" class="hidden mt-3 grid grid-cols-2 gap-3"></div>
</div>

<div class="space-y-3">
<h3 class="font-semibold uppercase tracking-wider text-xs">Upload Watermark Template</h3>
<div class="group relative flex flex-col items-center justify-center w-full h-44 border-2 border-dashed rounded-xl cursor-pointer">
<span class="material-symbols-outlined text-4xl">branding_watermark</span>
<input name="template_image" id="template_image" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/png,image/jpeg" type="file"  required>
</div>
<img id="templatePreview" class="hidden mt-3 w-full max-h-64 object-contain rounded-lg border" />
</div>

<button id="submitBtn" type="submit" class="w-full bg-blue-500 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined">search_check</span>
Detect Watermark
</button>

<div id="analysisOutput" class="hidden mt-6 bg-black text-green-400 rounded-lg p-6 font-mono text-sm whitespace-pre-wrap"></div>

</form>
</main>
</div>

<script>
const form=document.getElementById('detectForm');
const analysisOutput=document.getElementById('analysisOutput');
const submitBtn=document.getElementById('submitBtn');

const mainInput=document.getElementById('main_image');
const templateInput=document.getElementById('template_image');
const mainPreview=document.getElementById('mainPreview');
const templatePreview=document.getElementById('templatePreview');

/* -------- FIX 1: Non-blocking preview rendering -------- */
mainInput.addEventListener('change', async ()=>{
 const files=mainInput.files;
 mainPreview.innerHTML='';
 if(!files || files.length===0){ mainPreview.classList.add('hidden'); return; }

 mainPreview.classList.remove('hidden');

 for(const file of files){
   await new Promise(r=>requestAnimationFrame(r)); // yield UI thread

   const url=URL.createObjectURL(file);
   const img=document.createElement('img');
   img.src=url;
   img.dataset.url=url;

   img.className='w-full h-40 object-cover rounded-lg border cursor-zoom-in';
   img.onclick=()=>openModal(img.dataset.url);

   img.onload=()=>{}; // DO NOT revoke here

   mainPreview.appendChild(img);
 }
});

/* template preview */
templateInput.addEventListener('change',()=>{
 const file=templateInput.files && templateInput.files[0];
 if(!file){ templatePreview.classList.add('hidden'); templatePreview.removeAttribute('src'); return; }
 const url=URL.createObjectURL(file);
 templatePreview.dataset.url=url;
 templatePreview.src=url;
 templatePreview.classList.remove('hidden');
});

/* -------- FIX 2: prevent permanent browser hang -------- */
form.addEventListener('submit',async(e)=>{
 e.preventDefault();

 submitBtn.disabled=true;
 submitBtn.innerText="Processing...";

 const controller=new AbortController();
 const timeout=setTimeout(()=>controller.abort(),60000);

 const formData=new FormData(form);

 try{
  const res=await fetch(form.action,{method:'POST',body:formData,signal:controller.signal});
  clearTimeout(timeout);

  const text=await res.text(); // avoid json freeze

  analysisOutput.classList.remove('hidden');
  analysisOutput.textContent = text.length>20000 ? text.slice(0,20000)+"\n\n[TRUNCATED]" : text;

 }catch(err){
  analysisOutput.classList.remove('hidden');
  analysisOutput.textContent = '{"error":"Server timeout or connection failed"}';
 }

 submitBtn.disabled=false;
 submitBtn.innerHTML='<span class="material-symbols-outlined">search_check</span>Detect Watermark';
});
</script>

<!-- Image Zoom Modal -->
<div id="imgModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <img id="modalImg" class="max-h-[90%] max-w-[90%] rounded-lg shadow-2xl" />
</div>

<script>
function openModal(src){
 const modal=document.getElementById('imgModal');
 const modalImg=document.getElementById('modalImg');

 modalImg.src=src;
 modal.classList.remove('hidden');
 modal.classList.add('flex');

 modal.onclick=()=>{
   modal.classList.add('hidden');
   modal.classList.remove('flex');
 };
}
</script>

</body>
</html>
