
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
:root{
  --bg:#d6dce1;
  --panel:#010409;
  --accent:#3b82f6;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --error:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:linear-gradient(135deg,#a6a7ae,#0f172a);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.card{
  width:380px;
  background:var(--panel);
  border:1px solid #d0d4d8;
  border-radius:14px;
  padding:34px 30px;
  box-shadow:0 10px 40px rgba(78, 76, 76, 0.393);
  animation:fade .5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
.title{
  text-align:center;
  font-size:24px;
  font-weight:600;
  margin-bottom:20px;
}
label{font-size:13px;color:var(--muted)}
input{
  width:100%;
  padding:12px 12px;
  margin-top:6px;
  margin-bottom:18px;
  border-radius:8px;
  border:1px solid #334155;
  background:#767882;
  color:var(--text);
  outline:none;
  transition:.2s;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}
button:hover{background:#2563eb}
.footer{
  text-align:center;
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
}
.footer a{color:var(--text);text-decoration:none}
.footer a:hover{text-decoration:underline}

</style>
</head>
<body>

<div class="card">
<div class="title">Watermark Intelligence System</div>



<form method="POST" action="/login">
<label>Username</label>
<input name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>
</form>

<div class="footer">
No account? <a href="/signup">Create account</a>
</div>
</div>

</body>
</html>
