
<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#0b0b0c;
  --card:#111114;
  --border:#2a2a2f;
  --text:#f2f2f2;
  --muted:#9ca3af;
  --accent:#ffffff;
  --danger:#ff4d4f;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:linear-gradient(135deg,#a6a7ae,#0f172a);
  color:var(--text);
  font-family:Inter,system-ui,Arial,sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.box{
  width:420px;
  max-width:92%;
  padding:36px 34px 30px;
  border:1px solid var(--border);
  border-radius:18px;
  background:var(--card);
  box-shadow:0 25px 60px rgba(42, 42, 43, 0.65), inset 0 1px 0 rgba(255,255,255,.04);
}
h2{
  margin:0 0 25px;
  text-align:center;
  font-weight:600;
  letter-spacing:.5px;
}
form{
  display:flex;
  flex-direction:column;
}
input{
  width:100%;
  padding:13px 14px;
  margin:8px 0;
  background:#2d2d3870;
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:14px;
  transition:.18s border,.18s box-shadow,.18s background;
}
input::placeholder{color:var(--muted)}
input:focus{
  outline:none;
  border:1px solid #ffffffaa;
  background:#d6cdcd;
  box-shadow:0 0 0 3px rgba(255,255,255,.08);
}
button{
  width:100%;
  padding:13px;
  margin-top:14px;
  background:#000;
  border:1px solid #fff;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  letter-spacing:.4px;
  cursor:pointer;
  transition:.2s ease;
}
button:hover{
  background:#fff;
  color:#000;
  transform:translateY(-1px);
}
button:active{transform:translateY(0)}
.error{
  color:var(--danger);
  background:rgba(255,77,79,.12);
  border:1px solid rgba(255,77,79,.35);
  padding:10px 12px;
  border-radius:10px;
  margin-bottom:12px;
  font-size:14px;
}
.footer{
  margin-top:18px;
  text-align:center;
  font-size:14px;
  color:var(--muted);
}
.footer a{
  color:#fff;
  text-decoration:none;
  border-bottom:1px dashed #777;
  transition:.2s;
}
.footer a:hover{
  color:#fff;
  border-bottom-color:#fff;
}
</style>
</head>
<body>

<div class="box">
<h2>Create Account</h2>
<form method="POST" action="/signup">
<input name="username" placeholder="Username" required>
<input name="password" type="password" placeholder="Password" required>
<button type="submit">Signup</button>
<a href="/login">Back to login</a>
</form>
</div>
</body>
</html>
